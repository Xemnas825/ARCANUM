# Todo en uno: PostgreSQL + backend con frontend incluido. Solo: docker compose up
# Los datos de PostgreSQL persisten en el volumen postgres_data.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arcanum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arcanum_db"]
      interval: 2s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: arcanum_db
      PORT: 3001
      JWT_SECRET: arcanum-dev-secret
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin123!}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
